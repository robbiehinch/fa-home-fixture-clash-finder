name: Scheduled scrape

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Scrape fixtures
        run: npm run scrape

      - name: Commit updated fixtures.json
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/fixtures.json
          if git diff --cached --quiet; then
            echo "No fixture changes — skipping commit."
            exit 0
          fi
          git commit -m "chore: refresh fixtures ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
