name: Diagnose scraper coverage

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run diagnose
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: diagnose-report
          path: tmp/diagnose/
          retention-days: 14
